# Configuration for Smart NPC / Flow State Mode
mode: "npc"

env:
  map_size: [100.0, 100.0]
  start_pos_agent: [10.0, 10.0]
  start_pos_player: [50.0, 50.0] # Player starts at center
  goal_pos: [90.0, 90.0]
  max_steps_per_episode: 300
  obstacles:
    - {type: "rect", x: 30.0, y: 0.0, w: 10.0, h: 60.0}
    - {type: "rect", x: 60.0, y: 40.0, w: 10.0, h: 60.0}
  bug_zones: [] # No bug zones needed/expected to be active for standard NPC training

rewards:
  qa: {} # Not used in NPC mode
  npc:
    target_distance: 15.0        # Desired distance to maintain from player
    distance_tolerance: 5.0      # How much deviance is allowed before penalty scales up
    distance_reward_weight: 5.0  # Reward for keeping near target distance
    collision_penalty: -5.0      # Heavy penalty for hitting obstacles (NPC should be smart)
    repetition_penalty: -0.2     # Penalty for repeatedly choosing the same actions
    survival_reward: 1.0         # Small positive reinforcement for staying alive
    out_of_bounds_penalty: -10.0 # Heavy penalty for escaping map

rl:
  algorithm: "PPO"
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  ent_coef: 0.01                 # Lower entropy coefficient for more focused training
  total_timesteps: 40000
